<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você aceita se casar comigo? 💍</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #333;
    }

    .container {
      text-align: center;
      z-index: 10;
      position: relative;
      width: 90%;
      max-width: 800px;
    }

    h1 {
      font-size: 3.2rem;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    .gif {
      width: 220px;
      height: 220px;
      margin: 20px auto;
      border-radius: 20px;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
      min-height: 220px;
      width: 100%;
    }

    button {
      padding: 18px 45px;
      font-size: 1.6rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    #yesBtn {
      background: #4ade80;
      color: white;
      position: relative;
      z-index: 2;
      margin: 0 auto;
      display: block;
    }

    #noBtn {
      background: #f87171;
      color: white;
      position: absolute;
      z-index: 1;
    }

    #yesBtn:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  
  <div class="container">
    <h1 id="question">Você aceita se casar comigo? 💍</h1>
    <img id="gif" class="gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="fofinho">
    
    <div class="buttons">
      <button id="yesBtn">SIM 💖</button>
      <button id="noBtn">NÃO</button>
    </div>
  </div>

  <script>
    const noMessages = [
      "Tem certeza? 😢",
      "Poxa vida, pensa bem... 🥺",
      "Eu vou ficar muito triste... 😭",
      "Por favor, amor... 💔",
      "Não faz isso comigo... 🥹",
      "Me dá uma chance 🥺",
      "Você é o amor da minha vida... ❤️",
      "Eu te amo demais pra aceitar não 😘",
      "Eu sou maluco por você, carioca ❤️",
      "Eu não quero viver sem você 😭",
      "CASA COMIGO! 💍",
      "Diz SIM! 🥹",
      "Eu já planejei nossa vida inteira... 😭",
      "Você me completa... não tira isso de mim ❤️",
      "Meu coração vai quebrar... 💔"
    ];

    let noCount = 0;

    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const gif = document.getElementById('gif');
    const question = document.getElementById('question');

    function moveNoButton() {
      const btnWidth = noBtn.offsetWidth || 140;
      const btnHeight = noBtn.offsetHeight || 60;

      // Margens de segurança para não sair da tela
      const minX = 30;
      const maxX = window.innerWidth - btnWidth - 30;
      const minY = 180;   // evita ficar muito em cima (debaixo do título e gif)
      const maxY = window.innerHeight - btnHeight - 100;

      const randomX = Math.max(minX, Math.random() * (maxX - minX));
      const randomY = Math.max(minY, Math.random() * (maxY - minY));

      noBtn.style.left = randomX + 'px';
      noBtn.style.top = randomY + 'px';
    }

    noBtn.addEventListener('click', () => {
      noBtn.textContent = noMessages[noCount % noMessages.length];
      noCount++;
      moveNoButton();
    });

    // Primeiro movimento após carregar a página
    window.addEventListener('load', () => {
      setTimeout(moveNoButton, 800);
    });

    // Recalcula posição se a janela for redimensionada
    window.addEventListener('resize', () => {
      moveNoButton();
    });

    yesBtn.addEventListener('click', () => {
      question.innerHTML = `EU SABIA QUE VOCÊ DIRIA SIM!!! ❤️ <br><br>Agora somos casados!`;
      yesBtn.style.display = 'none';
      noBtn.style.display = 'none';
      gif.src = "https://media.tenor.com/7o7z7Z7Z7Z0AAAAj/kiss-love.gif";
      
      createHearts();
      alert("🎉 Parabéns! Você me fez a pessoa mais feliz do mundo! 💍");
    });

    function createHearts() {
      const heartsContainer = document.getElementById('hearts');
      for (let i = 0; i < 150; i++) {
        const heart = document.createElement('div');
        heart.textContent = ['💖', '💍', '❤️', '💘'][Math.floor(Math.random()*4)];
        heart.style.position = 'absolute';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = Math.random() * 30 + 20 + 'px';
        heart.style.animation = `fall ${Math.random()*5 + 5}s linear forwards`;
        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 10000);
      }
    }

    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes fall {
        to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
